<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advanced Calculator</title><style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
  font-family: 'Poppins', sans-serif;
}

.calculator {
  width: 390px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border-radius: 28px;
  padding: 22px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.brand {
  color: white;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 1px;
}

.clock {
  color: #7df9ff;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
}

.history {
  min-height: 24px;
  color: rgba(255,255,255,0.65);
  text-align: right;
  font-size: 14px;
  margin-bottom: 8px;
  word-break: break-word;
}

.display {
  min-height: 100px;
  border-radius: 22px;
  background: rgba(255,255,255,0.08);
  padding: 18px;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  margin-bottom: 18px;
  border: 1px solid rgba(255,255,255,0.08);
}

.display-value {
  color: white;
  font-size: 42px;
  font-family: 'Orbitron', sans-serif;
  word-break: break-word;
  text-align: right;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

button {
  border: none;
  border-radius: 18px;
  padding: 18px;
  font-size: 20px;
  cursor: pointer;
  transition: 0.2s;
  font-weight: 600;
}

button:hover {
  transform: translateY(-2px);
}

button:active {
  transform: scale(0.97);
}

.num {
  background: rgba(255,255,255,0.08);
  color: white;
}

.op {
  background: #f59e0b;
  color: white;
}

.equal {
  background: #10b981;
  color: white;
}

.clear {
  background: #ef4444;
  color: white;
}

.special {
  background: #3b82f6;
  color: white;
}

.zero {
  grid-column: span 2;
}

.footer {
  margin-top: 16px;
  text-align: center;
  color: rgba(255,255,255,0.85);
  font-size: 12px;
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 0;
}
</style></head>
<body><div class="calculator">
  <div class="top-bar">
    <button class="special" onclick="toggleSettings()">⚙️</button>
    <div class="brand">SMART CALCULATOR</div>
    <div class="clock" id="clock">00:00</div>
  </div>  <div class="history" id="history"></div>  <div class="display">
    <div class="display-value" id="display">0</div>
  </div>  <div id="settingsPanel" style="display:none; margin-bottom:18px; padding:14px; border-radius:18px; background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.08); color:white;">
  <div style="margin-bottom:10px; font-weight:600;">Réglages</div>
  <button class="special" onclick="changeBackground()">Changer Fond</button>
  <button class="special" onclick="changeDisplaySize()">Taille Écran</button>
</div><div class="buttons">
    <button class="clear" onclick="clearAll()">AC</button>
    <button class="special" onclick="deleteLast()">⌫</button>
    <button class="special" onclick="percent()">%</button>
    <button class="op" onclick="chooseOperator('/')">÷</button><button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="op" onclick="chooseOperator('*')">×</button>

<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="op" onclick="chooseOperator('-')">−</button>

<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="op" onclick="chooseOperator('+')">+</button>

<button class="num zero" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

  </div>  <div class="footer">Younes Bouzouita</div>
</div><script>
let current = '0';
let previous = '';
let operator = null;
let shouldReset = false;

const display = document.getElementById('display');
const history = document.getElementById('history');
const clock = document.getElementById('clock');

function updateDisplay() {
  display.textContent = current;
}

function append(value) {
  if (shouldReset) {
    current = '';
    shouldReset = false;
  }

  if (value === '.' && current.includes('.')) return;

  if (current === '0' && value !== '.') {
    current = value;
  } else {
    current += value;
  }

  updateDisplay();
}

function chooseOperator(op) {
  if (operator !== null) calculate();
  previous = current;
  operator = op;
  shouldReset = true;
  history.textContent = `${previous} ${op}`;
}

function calculate() {
  if (!operator || shouldReset) return;

  let prev = parseFloat(previous);
  let curr = parseFloat(current);
  let result;

  switch (operator) {
    case '+': result = prev + curr; break;
    case '-': result = prev - curr; break;
    case '*': result = prev * curr; break;
    case '/': result = curr === 0 ? 'Error' : prev / curr; break;
    default: return;
  }

  history.textContent = `${previous} ${operator} ${current} =`;
  current = String(result);
  operator = null;
  previous = '';
  shouldReset = true;
  updateDisplay();
}

function clearAll() {
  current = '0';
  previous = '';
  operator = null;
  shouldReset = false;
  history.textContent = '';
  updateDisplay();
}

function deleteLast() {
  if (current.length === 1) {
    current = '0';
  } else {
    current = current.slice(0, -1);
  }
  updateDisplay();
}

function percent() {
  current = String(parseFloat(current) / 100);
  updateDisplay();
}

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  clock.textContent = `${h}:${m}`;
}

setInterval(updateClock, 1000);
updateClock();
updateDisplay();

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function changeBackground() {
  const colors = [
    'linear-gradient(135deg, #0f172a, #111827, #1e293b)',
    'linear-gradient(135deg, #1f2937, #7c3aed, #111827)',
    'linear-gradient(135deg, #064e3b, #065f46, #022c22)',
    'linear-gradient(135deg, #3b0764, #1e1b4b, #111827)'
  ];
  const currentBg = document.body.style.background;
  const next = colors[Math.floor(Math.random() * colors.length)];
  document.body.style.background = next;
}

function changeDisplaySize() {
  const display = document.getElementById('display');
  const current = window.getComputedStyle(display).fontSize;
  display.style.fontSize = current === '42px' ? '32px' : '42px';
}

document.addEventListener('keydown', (e) => {
  if (!isNaN(e.key)) append(e.key);
  if (e.key === '.') append('.');
  if (e.key === '+') chooseOperator('+');
  if (e.key === '-') chooseOperator('-');
  if (e.key === '*') chooseOperator('*');
  if (e.key === '/') chooseOperator('/');
  if (e.key === 'Enter' || e.key === '=') calculate();
  if (e.key === 'Backspace') deleteLast();
  if (e.key === 'Escape') clearAll();
});
</script></body>
</html>
